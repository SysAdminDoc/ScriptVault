version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 6
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      test-tooling:
        dependency-type: "development"
        patterns:
          - "vitest"
          - "@vitest/*"
        update-types:
          - "minor"
          - "patch"
      browser-test-tooling:
        dependency-type: "development"
        patterns:
          - "@playwright/test"
          - "jsdom"
          - "puppeteer-core"
        update-types:
          - "minor"
          - "patch"
      extension-release-tooling:
        dependency-type: "development"
        patterns:
          - "chrome-types"
          - "chrome-webstore-upload-cli"
          - "web-ext"
        update-types:
          - "minor"
          - "patch"
      build-tooling:
        dependency-type: "development"
        patterns:
          - "esbuild"
          - "typescript"
        update-types:
          - "minor"
          - "patch"
      editor-runtime:
        dependency-type: "development"
        patterns:
          - "monaco-editor"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "08:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
