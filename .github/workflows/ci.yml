name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve package version
        id: package
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: npm audit (high+ severity)
        run: npm audit --audit-level=high --omit=optional

      - name: Toolchain contract
        run: npm run toolchain:check

      - name: GitHub Actions pins
        run: npm run actions:pins:check

      - name: Optional dependency reachability
        run: npm run optional-deps:check

      - name: Settings schema
        run: npm run settings:schema:check

      - name: Monaco package contract
        run: npm run monaco:package:check

      - name: Readability
        run: npm run readability:check

      - name: Dashboard modules
        run: npm run dashboard:modules:check

      - name: What's new changelog
        run: npm run whatsnew:check

      - name: Store copy
        run: npm run store-copy:check

      - name: CWS remote code
        run: npm run cws:remote-code:check -- --target ScriptVault-v${{ steps.package.outputs.version }}.zip

      - name: CWS publish tooling
        run: npm run cws:check

      - name: Release artifact check
        run: npm run release:check

      - name: Reproducible Chrome ZIP
        run: npm run release:reproducible-build:check

      - name: Rollback drill
        run: npm run release:rollback-drill

      - name: Release trust
        run: npm run release:trust

      - name: CRA SBOM
        run: npm run release:trust:cra

      - name: Store status
        run: npm run release:store-status

      - name: scriptvault-firefox-package
        run: npm run firefox:package

      - name: Coverage
        run: npm run test:cov
