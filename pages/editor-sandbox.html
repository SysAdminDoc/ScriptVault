<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScriptVault Monaco Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; color-scheme: dark; }
  #container { width: 100%; height: 100%; }
  #loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #a0a0a0;
    font-family: 'Segoe UI Variable Text', 'Segoe UI', system-ui, sans-serif;
    font-size: 0.8125rem;
    background:
      radial-gradient(circle at top right, rgba(34, 197, 94, 0.12), transparent 32%),
      linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 24%),
      #1e1e1e;
    z-index: 10;
    text-align: center;
    padding: 24px;
  }
  #loading strong {
    display: block;
    color: #e0e0e0;
    font-size: 0.9375rem;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  #loading small {
    display: block;
    color: #7a7a7a;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div id="loading" role="status" aria-live="polite" aria-atomic="true"><div><strong>Loading Editor…</strong><small>Preparing the local Monaco bundle.</small></div></div>
<div id="container"></div>
<script>
(function () {
  'use strict';

  const loading = document.getElementById('loading');
  let editor = null;
  let isReady = false;
  let pendingValue = null;
  let pendingOptions = null;
  let currentTheme = 'vs-dark';
  let ignoreNextChange = false;
  let monacoApi = null;

  // ── Load Monaco from local bundle ────────────────────────────────────────
  // Monaco is bundled locally in lib/monaco-esm/ at build time.
  // Keep the editor fully self-contained so installs and edits remain reliable offline.
  const LOCAL_ESM_ENTRY = '../lib/monaco-esm/editor.js';
  const LOCAL_ESM_CSS = '../lib/monaco-esm/editor.css';

  loadMonacoEsm().catch(() => {
    loading.innerHTML = '<div><strong>Editor Bundle Missing</strong><small>Rebuild the local Monaco assets with:<br>node esbuild.config.mjs --monaco-esm-only</small></div>';
    parent.postMessage({ type: 'monaco-load-error', reason: 'missing-bundle' }, '*');
  });

  async function loadMonacoEsm() {
    await loadStylesheet(LOCAL_ESM_CSS);
    const module = await import(LOCAL_ESM_ENTRY);
    initMonaco(module.monaco || module.default || window.ScriptVaultMonacoEsm?.monaco);
  }

  function loadStylesheet(href) {
    return new Promise((resolve, reject) => {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = href;
      link.onload = resolve;
      link.onerror = reject;
      document.head.appendChild(link);
    });
  }

  function initMonaco(monaco) {
    if (!monaco || !monaco.editor || !monaco.languages) throw new Error('Monaco ESM API unavailable');
    monacoApi = monaco;
      registerScriptVaultTypes(monaco);
      // ── Custom userscript language extension ──────────────────────────────
      // Register @metadata keywords in the completion provider
      monaco.languages.registerCompletionItemProvider('javascript', {
        triggerCharacters: ['@'],
        provideCompletionItems(model, position) {
          const textUntilPosition = model.getValueInRange({ startLineNumber: 1, startColumn: 1, endLineNumber: position.lineNumber, endColumn: position.column });
          // Only complete inside the userscript header
          if (!textUntilPosition.includes('==UserScript==') || textUntilPosition.includes('==/UserScript==')) return { suggestions: [] };

          const metaKeys = ['name','namespace','description','version','author','match','include','exclude','grant','require','resource','run-at','noframes','unwrap','icon','homepageURL','updateURL','downloadURL','antifeature','compatible','incompatible','tag','license','contributionURL','connect','priority','top-level-await','run-in','inject-into','sandbox','webRequest'];
          const grantValues = ['GM_getValue','GM_setValue','GM_deleteValue','GM_listValues','GM_getValues','GM_setValues','GM_deleteValues','GM_addStyle','GM_xmlhttpRequest','GM.xmlHttpRequest','GM_webSocket','GM.webSocket','GM_setClipboard','GM_notification','GM_openInTab','GM_download','GM_log','GM_registerMenuCommand','GM_unregisterMenuCommand','GM_getMenuCommands','GM_getResourceText','GM_getResourceURL','GM_addElement','GM_loadScript','GM_getTab','GM_saveTab','GM_getTabs','GM_addValueChangeListener','GM_removeValueChangeListener','GM_cookie','GM_focusTab','GM_webRequest','GM_audio','window.close','window.focus','window.onurlchange','none','*'];
          const runAtValues = ['document-start','document-body','document-end','document-idle','context-menu'];

          const word = model.getWordUntilPosition(position);
          const range = { startLineNumber: position.lineNumber, startColumn: word.startColumn, endLineNumber: position.lineNumber, endColumn: word.endColumn };

          const suggestions = metaKeys.map(key => ({
            label: '@' + key,
            kind: monaco.languages.CompletionItemKind.Keyword,
            insertText: '@' + key + ' ',
            range,
            detail: 'Userscript metadata'
          }));

          // Grant completions
          grantValues.forEach(v => suggestions.push({
            label: 'grant ' + v,
            kind: monaco.languages.CompletionItemKind.Value,
            insertText: 'grant ' + v,
            range,
            detail: 'GM permission'
          }));

          return { suggestions };
        }
      });

      // ── Create editor ─────────────────────────────────────────────────────
      editor = monaco.editor.create(document.getElementById('container'), {
        value: '',
        language: 'javascript',
        theme: currentTheme,
        fontSize: 13,
        fontFamily: "'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace",
        fontLigatures: true,
        lineNumbers: 'on',
        minimap: { enabled: true },
        scrollBeyondLastLine: false,
        wordWrap: 'off',
        automaticLayout: true,
        tabSize: 4,
        insertSpaces: true,
        matchBrackets: 'always',
        autoClosingBrackets: 'always',
        autoClosingQuotes: 'always',
        folding: true,
        renderWhitespace: 'none',
        suggest: { showKeywords: true, showSnippets: true },
        quickSuggestions: { other: true, comments: false, strings: false },
        parameterHints: { enabled: true },
        renderLineHighlight: 'line',
        cursorBlinking: 'smooth',
        smoothScrolling: true,
        bracketPairColorization: { enabled: true }
      });

      // ── Keyboard shortcuts ─────────────────────────────────────────────────
      editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => {
        parent.postMessage({ type: 'save' }, '*'); // sandbox cannot know parent origin
      });
      editor.addCommand(monaco.KeyCode.Escape, () => {
        parent.postMessage({ type: 'close' }, '*');
      });
      editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Slash, () => {
        editor.getAction('editor.action.commentLine')?.run();
      });
      editor.addCommand(monaco.KeyCode.F8, () => {
        editor.getAction('editor.action.marker.next')?.run();
      });
      editor.addCommand(monaco.KeyMod.Shift | monaco.KeyCode.F8, () => {
        editor.getAction('editor.action.marker.prev')?.run();
      });

      // ── Change tracking ────────────────────────────────────────────────────
      editor.onDidChangeModelContent(() => {
        if (ignoreNextChange) { ignoreNextChange = false; return; }
        parent.postMessage({ type: 'change', value: editor.getValue() }, '*');
      });

      // ── Find widget search-history bridge ───────────────────────────────────
      // Forward every find-widget searchString change to the dashboard so it
      // can persist the term in chrome.storage.local. The dashboard later
      // posts the persisted list back as a `prime-find` message so the
      // widget opens with the user's most recent term across sessions.
      try {
        const finder = editor.getContribution('editor.contrib.findController');
        const findState = finder && finder.getState && finder.getState();
        if (findState && typeof findState.onFindReplaceStateChange === 'function') {
          let lastReported = '';
          findState.onFindReplaceStateChange(() => {
            const value = (findState.searchString || '').trim();
            if (!value || value === lastReported) return;
            lastReported = value;
            parent.postMessage({ type: 'find-search', value }, '*');
          });
        }
      } catch (_) { /* older Monaco builds may not expose the controller */ }

      // ── Cursor tracking ────────────────────────────────────────────────────
      editor.onDidChangeCursorPosition(e => {
        parent.postMessage({ type: 'cursor', line: e.position.lineNumber, col: e.position.column }, '*');
      });

      // ── Custom themes matching ScriptVault themes ──────────────────────────
      monaco.editor.defineTheme('sv-dark', {
        base: 'vs-dark',
        inherit: true,
        rules: [
          { token: 'comment', foreground: '6a737d', fontStyle: 'italic' }
        ],
        colors: {
          'editor.background': '#1a1a1a',
          'editor.foreground': '#e0e0e0',
          'editorLineNumber.foreground': '#555',
          'editorLineNumber.activeForeground': '#888',
          'editor.lineHighlightBackground': '#242424',
          'editor.selectionBackground': '#264F78',
          'editorGutter.background': '#1a1a1a',
          'scrollbarSlider.background': '#444',
          'scrollbarSlider.hoverBackground': '#555'
        }
      });

      monaco.editor.defineTheme('sv-light', {
        base: 'vs',
        inherit: true,
        rules: [],
        colors: {
          'editor.background': '#ffffff',
          'editor.foreground': '#333333'
        }
      });

      monaco.editor.defineTheme('sv-catppuccin', {
        base: 'vs-dark',
        inherit: true,
        rules: [],
        colors: {
          'editor.background': '#1e1e2e',
          'editor.foreground': '#cdd6f4',
          'editorLineNumber.foreground': '#45475a',
          'editor.lineHighlightBackground': '#252536'
        }
      });

      monaco.editor.defineTheme('sv-oled', {
        base: 'vs-dark',
        inherit: true,
        rules: [
          { token: 'comment', foreground: '555555', fontStyle: 'italic' }
        ],
        colors: {
          'editor.background': '#000000',
          'editor.foreground': '#e0e0e0',
          'editorLineNumber.foreground': '#444',
          'editorLineNumber.activeForeground': '#888',
          'editor.lineHighlightBackground': '#0a0a0a',
          'editor.selectionBackground': '#1a3a5c',
          'editorGutter.background': '#000000',
          'scrollbarSlider.background': '#333',
          'editorWidget.background': '#0a0a0a',
          'editorWidget.border': '#222'
        }
      });

      monaco.editor.defineTheme('sv-nord', {
        base: 'vs-dark',
        inherit: true,
        rules: [
          { token: 'comment', foreground: '616e88', fontStyle: 'italic' },
          { token: 'keyword', foreground: '81a1c1' },
          { token: 'string', foreground: 'a3be8c' },
          { token: 'number', foreground: 'b48ead' }
        ],
        colors: {
          'editor.background': '#2e3440',
          'editor.foreground': '#d8dee9',
          'editorLineNumber.foreground': '#4c566a',
          'editor.lineHighlightBackground': '#3b4252',
          'editor.selectionBackground': '#434c5e',
          'editorGutter.background': '#2e3440'
        }
      });

      monaco.editor.defineTheme('sv-dracula', {
        base: 'vs-dark',
        inherit: true,
        rules: [
          { token: 'comment', foreground: '6272a4', fontStyle: 'italic' },
          { token: 'keyword', foreground: 'ff79c6' },
          { token: 'string', foreground: 'f1fa8c' },
          { token: 'number', foreground: 'bd93f9' }
        ],
        colors: {
          'editor.background': '#282a36',
          'editor.foreground': '#f8f8f2',
          'editorLineNumber.foreground': '#6272a4',
          'editor.lineHighlightBackground': '#44475a',
          'editor.selectionBackground': '#44475a',
          'editorGutter.background': '#282a36'
        }
      });

      monaco.editor.defineTheme('sv-gruvbox', {
        base: 'vs-dark',
        inherit: true,
        rules: [
          { token: 'comment', foreground: '928374', fontStyle: 'italic' },
          { token: 'keyword', foreground: 'fb4934' },
          { token: 'string', foreground: 'b8bb26' },
          { token: 'number', foreground: 'd3869b' }
        ],
        colors: {
          'editor.background': '#282828',
          'editor.foreground': '#ebdbb2',
          'editorLineNumber.foreground': '#665c54',
          'editor.lineHighlightBackground': '#3c3836',
          'editor.selectionBackground': '#504945',
          'editorGutter.background': '#282828'
        }
      });

      monaco.editor.defineTheme('sv-solarized-dark', {
        base: 'vs-dark',
        inherit: true,
        rules: [
          { token: 'comment', foreground: '586e75', fontStyle: 'italic' },
          { token: 'keyword', foreground: '859900' },
          { token: 'string', foreground: '2aa198' },
          { token: 'number', foreground: 'd33682' }
        ],
        colors: {
          'editor.background': '#002b36',
          'editor.foreground': '#839496',
          'editorLineNumber.foreground': '#586e75',
          'editor.lineHighlightBackground': '#073642',
          'editor.selectionBackground': '#073642',
          'editorGutter.background': '#002b36'
        }
      });

      // Claude theme — warm autumn palette inspired by Claude's brand (Phase 39.9)
      monaco.editor.defineTheme('sv-claude', {
        base: 'vs-dark',
        inherit: true,
        rules: [
          { token: 'comment', foreground: '8b7355', fontStyle: 'italic' },
          { token: 'keyword', foreground: 'd97757' },
          { token: 'string', foreground: 'c39c79' },
          { token: 'number', foreground: 'e8a87c' },
          { token: 'type', foreground: 'a6745c' },
          { token: 'function', foreground: 'd97757' },
          { token: 'variable', foreground: 'e6d3b5' }
        ],
        colors: {
          'editor.background': '#1f1b16',
          'editor.foreground': '#e6d3b5',
          'editorLineNumber.foreground': '#5c4a3a',
          'editor.lineHighlightBackground': '#2a241e',
          'editor.selectionBackground': '#4a3a2c',
          'editorGutter.background': '#1f1b16',
          'editorCursor.foreground': '#d97757'
        }
      });

      isReady = true;
      loading.style.display = 'none';

      // Apply any pending operations
      if (pendingOptions) { applyOptions(pendingOptions); pendingOptions = null; }
      if (pendingValue !== null) { setValue(pendingValue); pendingValue = null; }

      // Signal ready to parent
      parent.postMessage({ type: 'ready' }, '*');
  }

  // ── Message handler (from dashboard) ──────────────────────────────────────
  async function registerScriptVaultTypes(monaco) {
    const defaults = monaco.typescript?.javascriptDefaults || monaco.languages?.typescript?.javascriptDefaults;
    if (!defaults || typeof defaults.addExtraLib !== 'function' || typeof fetch !== 'function') return;

    try {
      const response = await fetch('../lib/scriptvault.d.ts', { cache: 'force-cache' });
      if (!response || !response.ok) return;
      const source = await response.text();
      defaults.addExtraLib(source, 'file:///scriptvault/lib/scriptvault.d.ts');
    } catch (_) { /* local type hints are best-effort; editor loading must not fail */ }
  }

  window.addEventListener('message', function (e) {
    const msg = e.data;
    if (!msg || typeof msg !== 'object') return;

    switch (msg.type) {
      case 'set-value':
        if (isReady) setValue(msg.value || '', msg.scriptId);
        else pendingValue = msg.value || '';
        break;
      case 'get-value':
        if (editor) e.source.postMessage({ type: 'value', value: editor.getValue(), requestId: msg.requestId }, e.origin || location.origin);
        break;
      case 'set-theme':
        currentTheme = mapTheme(msg.theme);
        if (editor && monacoApi) monacoApi.editor.setTheme(currentTheme);
        break;
      case 'set-options':
        if (isReady) applyOptions(msg.options || {});
        else pendingOptions = msg.options || {};
        break;
      case 'focus':
        if (editor) editor.focus();
        break;
      case 'format':
        if (editor) editor.getAction('editor.action.formatDocument')?.run();
        break;
      case 'toggle-comment':
        if (editor) editor.getAction('editor.action.commentLine')?.run();
        break;
      case 'toggle-word-wrap':
        if (editor && monacoApi) editor.updateOptions({ wordWrap: editor.getOption(monacoApi.editor.EditorOption.wordWrap) === 'off' ? 'on' : 'off' });
        break;
      case 'set-font-size':
        if (editor) editor.updateOptions({ fontSize: msg.size || 13 });
        break;
      case 'set-position':
        if (editor && Number.isFinite(msg.line)) {
          const lineNumber = Math.max(1, Math.floor(msg.line));
          const column = Math.max(1, Math.floor(msg.col || 1));
          editor.setPosition({ lineNumber, column });
          editor.revealLineInCenter(lineNumber);
          editor.focus();
        }
        break;
      case 'insert-text':
        if (editor) {
          editor.focus();
          const sel = editor.getSelection();
          editor.executeEdits('snippet', [{ range: sel, text: msg.text || '', forceMoveMarkers: true }]);
        }
        break;
      case 'action':
        if (editor && msg.id) {
          const act = editor.getAction(msg.id);
          if (act) act.run();
          else editor.trigger('adapter', msg.id, null);
        }
        break;
      case 'prime-find':
        // Seed the find widget's searchString with the most recent saved
        // term so Ctrl+F opens the widget pre-filled. Does not auto-open.
        if (editor && Array.isArray(msg.history) && msg.history.length > 0) {
          try {
            const finder = editor.getContribution('editor.contrib.findController');
            const state = finder && finder.getState && finder.getState();
            if (state && typeof state.change === 'function') {
              state.change({ searchString: String(msg.history[0]) }, false);
            }
          } catch (_) {}
        }
        break;
    }
  });

  function setValue(value, scriptId) {
    if (!editor) return;
    // Preserve cursor position on same-script reload
    const pos = editor.getPosition();
    // Only arm the change-suppression latch when the content is actually
    // changing. Monaco fires onDidChangeModelContent only on a real change, so
    // arming it for a no-op setValue (e.g. re-activating a same-content tab)
    // would leave the latch set and swallow the user's next real keystroke.
    if (editor.getValue() === value) {
      editor.focus();
      return;
    }
    ignoreNextChange = true;
    editor.setValue(value);
    if (pos) editor.setPosition(pos);
    editor.focus();
  }

  function applyOptions(opts) {
    if (!editor) return;
    const updates = {};
    if (opts.tabSize != null) updates.tabSize = opts.tabSize;
    if (opts.insertSpaces != null) updates.insertSpaces = opts.insertSpaces;
    if (opts.wordWrap != null) updates.wordWrap = opts.wordWrap ? 'on' : 'off';
    if (opts.fontSize != null) updates.fontSize = opts.fontSize;
    if (opts.lineNumbers != null) updates.lineNumbers = opts.lineNumbers ? 'on' : 'off';
    if (opts.minimap != null) updates.minimap = { enabled: opts.minimap };
    if (Object.keys(updates).length) editor.updateOptions(updates);
    if (opts.theme && monacoApi) { currentTheme = mapTheme(opts.theme); monacoApi.editor.setTheme(currentTheme); }
  }

  function mapTheme(theme) {
    const map = {
      dark: 'sv-dark', light: 'sv-light', catppuccin: 'sv-catppuccin', oled: 'sv-oled',
      nord: 'sv-nord', dracula: 'sv-dracula', gruvbox: 'sv-gruvbox',
      'solarized-dark': 'sv-solarized-dark', 'solarized-light': 'sv-light',
      monokai: 'sv-gruvbox', claude: 'sv-claude', default: 'sv-dark'
    };
    return map[theme] || 'sv-dark';
  }
})();
</script>
</body>
</html>
