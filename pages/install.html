<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Install Userscript - ScriptVault</title>
  
  <!-- CodeMirror for code preview -->
  <link rel="stylesheet" href="../lib/codemirror/codemirror.min.css">
  <link rel="stylesheet" href="../lib/codemirror/theme/monokai.min.css">
  <link rel="stylesheet" href="../lib/codemirror/theme/dracula.min.css">
  <script src="../lib/codemirror/codemirror.min.js"></script>
  <script src="../lib/codemirror/mode/javascript/javascript.min.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --bg-hover: #475569;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --accent-bg: rgba(34, 197, 94, 0.1);
      --blue: #60a5fa;
      --blue-hover: #3b82f6;
      --blue-bg: rgba(96, 165, 250, 0.1);
      --danger: #ef4444;
      --danger-bg: rgba(239, 68, 68, 0.1);
      --warning: #f59e0b;
      --warning-bg: rgba(245, 158, 11, 0.1);
      --border: #334155;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      --radius: 8px;
      --radius-sm: 6px;
      --radius-xs: 4px;
    }
    
    [data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --bg-hover: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    }

    [data-theme="catppuccin"] {
      --bg-primary: #1e1e2e;
      --bg-secondary: #252536;
      --bg-tertiary: #313244;
      --bg-hover: #3b3b52;
      --text-primary: #cdd6f4;
      --text-secondary: #a6adc8;
      --text-muted: #585b70;
      --accent: #a6e3a1;
      --accent-hover: #94d990;
      --accent-bg: rgba(166, 227, 161, 0.1);
      --blue: #89b4fa;
      --blue-hover: #74a8f7;
      --blue-bg: rgba(137, 180, 250, 0.1);
      --danger: #f38ba8;
      --danger-bg: rgba(243, 139, 168, 0.1);
      --warning: #f9e2af;
      --warning-bg: rgba(249, 226, 175, 0.1);
      --border: #45475a;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    [data-theme="oled"] {
      --bg-primary: #000000;
      --bg-secondary: #0a0a0a;
      --bg-tertiary: #151515;
      --bg-hover: #1f1f1f;
      --text-primary: #e0e0e0;
      --text-secondary: #999;
      --text-muted: #555;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --accent-bg: rgba(34, 197, 94, 0.1);
      --blue: #60a5fa;
      --blue-hover: #3b82f6;
      --blue-bg: rgba(96, 165, 250, 0.1);
      --danger: #ef4444;
      --danger-bg: rgba(239, 68, 68, 0.1);
      --warning: #f59e0b;
      --warning-bg: rgba(245, 158, 11, 0.1);
      --border: #1a1a1a;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
    }

    html:not([data-theme="light"]) {
      color-scheme: dark;
    }

    html[data-theme="light"] {
      color-scheme: light;
    }
    
    body {
      font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.045), transparent 18rem),
        linear-gradient(135deg, rgba(34, 197, 94, 0.10), rgba(96, 165, 250, 0.055) 42%, transparent 82%),
        var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 20px 40px;
      text-rendering: optimizeLegibility;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.2s, color 0.2s;
    }

    button, input, select, textarea, a {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .install-skip-link {
      position: absolute;
      left: 18px;
      top: 14px;
      z-index: 1000;
      transform: translateY(-160%);
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 0.8125rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.15s ease;
    }

    .install-skip-link:focus-visible {
      transform: translateY(0);
    }

    /* Focus styles for accessibility */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    button:focus-visible { border-radius: 8px; }
    input:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--accent); }

    .container {
      max-width: 1040px;
      width: 100%;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 160px),
        var(--bg-secondary);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(127, 127, 127, 0.14);
    }
    
    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--border);
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    
    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
    }
    
    .header-text h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
      text-wrap: balance;
    }
    
    .header-text p {
      font-size: 0.8125rem;
      color: var(--text-muted);
      max-width: 34rem;
    }
    
    .update-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: var(--blue-bg);
      color: var(--blue);
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .header-help-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      min-height: 30px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      font: inherit;
      font-size: 0.8125rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    .header-help-btn:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
      color: var(--text-primary);
      transform: translateY(-1px);
    }
    
    .reinstall-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: var(--warning-bg);
      color: var(--warning);
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    
    /* Content */
    .content {
      padding: 22px 24px 24px;
    }

    .install-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 20px;
      align-items: start;
    }

    .install-main,
    .install-sidebar {
      min-width: 0;
    }

    .install-sidebar {
      position: sticky;
      top: 20px;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .review-nav {
      position: sticky;
      top: 14px;
      z-index: 4;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px;
      border: 1px solid rgba(127, 127, 127, 0.16);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
        rgba(15, 23, 42, 0.34);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.16);
      backdrop-filter: none;
    }

    .review-nav-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 4px;
    }

    .review-nav-status {
      font-size: 0.6875rem;
      line-height: 1.4;
      color: var(--text-muted);
      text-wrap: pretty;
    }

    .review-nav-btn {
      border: 1px solid rgba(127, 127, 127, 0.16);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-secondary);
      font: inherit;
      font-size: 0.6875rem;
      font-weight: 600;
      border-radius: var(--radius-sm);
      padding: 7px 10px;
      cursor: pointer;
      transition: border-color 0.18s ease, background-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
      white-space: nowrap;
    }

    .review-nav-btn:hover {
      border-color: rgba(96, 165, 250, 0.32);
      background: var(--blue-bg);
      color: var(--blue);
      transform: translateY(-1px);
    }

    .review-nav-btn.is-active,
    .review-nav-btn[aria-pressed="true"] {
      border-color: rgba(34, 197, 94, 0.36);
      background: var(--accent-bg);
      color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(34, 197, 94, 0.16);
    }

    .review-section {
      scroll-margin-top: 108px;
    }

    .surface-card {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 140%),
        var(--bg-tertiary);
      border: 1px solid rgba(127, 127, 127, 0.16);
      border-radius: var(--radius);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
      content-visibility: auto;
      contain-intrinsic-size: 200px;
    }
    
    /* Script Info Card */
    .script-card {
      overflow: hidden;
    }
    
    .script-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    
    .script-icon-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }
    
    .script-icon {
      width: 42px;
      height: 42px;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3125rem;
      color: var(--text-muted);
    }
    
    .script-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: var(--radius-sm);
    }
    
    .script-title-area {
      flex: 1;
    }
    
    .script-name {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .script-version {
      font-size: 0.8125rem;
      color: var(--text-muted);
    }
    
    .script-version .version-change {
      color: var(--blue);
    }
    
    .script-description {
      color: var(--text-secondary);
      font-size: 0.8125rem;
      line-height: 1.45;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .summary-card {
      padding: 14px 16px;
    }

    .summary-label {
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .summary-value {
      margin-top: 8px;
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    .summary-meta {
      margin-top: 6px;
      font-size: 0.75rem;
      line-height: 1.55;
      color: var(--text-secondary);
    }
    
    /* Script Meta */
    .script-meta {
      padding: 16px;
    }
    
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    
    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .meta-item.full-width {
      grid-column: 1 / -1;
    }
    
    .meta-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    
    .meta-value {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      word-break: break-all;
    }
    
    .meta-value a {
      color: var(--blue);
      text-decoration: none;
    }
    
    .meta-value a:hover {
      text-decoration: underline;
    }
    
    /* Sections */
    .section {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
    }
    
    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .section-title .count {
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.6875rem;
    }

    .count.status-good {
      background: var(--accent);
      color: #fff;
    }

    .count.status-warn {
      background: var(--warning);
      color: #1a1a1a;
    }

    .count.status-neutral {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    
    /* Tags */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    
    .tag {
      font-size: 0.75rem;
      padding: 4px 10px;
      background: var(--bg-secondary);
      border-radius: var(--radius-xs);
      color: var(--text-secondary);
      font-family: 'Monaco', 'Menlo', monospace;
      border: 1px solid rgba(127, 127, 127, 0.12);
    }
    
    .tag.warning {
      background: var(--danger-bg);
      color: var(--danger);
    }
    
    .tag.safe {
      background: var(--accent-bg);
      color: var(--accent);
    }

    .tag.neutral {
      opacity: 0.7;
    }
    
    /* Match list */
    .match-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .match-item {
      font-size: 0.75rem;
      font-family: 'Monaco', 'Menlo', monospace;
      color: var(--text-secondary);
      padding: 7px 10px;
      background: var(--bg-secondary);
      border-radius: var(--radius-xs);
      word-break: break-all;
    }
    
    .match-item::before {
      content: '•';
      color: var(--accent);
      margin-inline-end: 6px;
    }

    .match-item.neutral {
      color: var(--text-muted);
    }

    .match-list-overflow {
      display: contents;
    }

    .match-list-actions {
      margin-top: 8px;
    }

    .match-list-toggle {
      border: 1px solid rgba(127, 127, 127, 0.18);
      background: var(--bg-secondary);
      color: var(--blue);
      font: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      cursor: pointer;
      transition: border-color 0.18s ease, background-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    .match-list-toggle:hover {
      border-color: var(--blue);
      background: var(--blue-bg);
      color: var(--blue-hover);
      transform: translateY(-1px);
    }
    
    .install-alert-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .install-alert {
      border-radius: var(--radius);
      padding: 14px 16px;
      border: 1px solid rgba(127, 127, 127, 0.14);
      background: rgba(255, 255, 255, 0.03);
    }

    .install-alert.is-danger {
      border-color: rgba(239, 68, 68, 0.45);
      background: var(--danger-bg);
    }

    .install-alert.is-warning {
      border-color: rgba(245, 158, 11, 0.45);
      background: var(--warning-bg);
    }

    .install-alert.is-info {
      border-color: rgba(96, 165, 250, 0.35);
      background: var(--blue-bg);
    }

    .install-alert-header {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .install-alert.is-danger .install-alert-header {
      color: var(--danger);
    }

    .install-alert.is-warning .install-alert-header {
      color: var(--warning);
    }

    .install-alert.is-info .install-alert-header {
      color: var(--blue);
    }

    .install-alert-body {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .install-alert-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .install-alert-list-item {
      color: var(--text-secondary);
    }

    .install-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .install-card-title {
      font-size: 0.9375rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .install-card-subtitle {
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 0.75rem;
      line-height: 1.5;
    }
    
    /* Options */
    .options {
      padding-top: 14px;
      margin-top: 14px;
      border-top: 1px solid var(--border);
    }
    
    .options-title {
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
    }
    
    .option-row:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }
    
    .option-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .option-label {
      font-size: 0.875rem;
      font-weight: 500;
    }
    
    .option-description {
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    
    /* Toggle */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--bg-hover);
      transition: 0.2s;
      border-radius: var(--radius);
    }
    
    .toggle-slider::before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: var(--toggle-knob, #fff);
      transition: 0.2s;
      border-radius: 50%;
    }
    
    .toggle input:checked + .toggle-slider {
      background-color: var(--accent);
    }
    
    .toggle input:checked + .toggle-slider::before {
      transform: translateX(20px);
    }
    
    /* Code Preview */
    .code-preview {
      padding: 14px 16px 16px;
    }
    
    .code-preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    
    .code-preview-title {
      font-size: 0.875rem;
      font-weight: 600;
    }

    .code-preview-title .install-card-subtitle {
      display: inline;
      margin-top: 0;
      margin-inline-start: 6px;
      font-size: 0.75rem;
      font-weight: 400;
    }
    
    .code-preview-toggle {
      font-size: 0.8125rem;
      color: var(--blue);
      cursor: pointer;
      background: none;
      border: none;
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 600;
    }
    
    .code-preview-toggle:hover {
      text-decoration: underline;
    }
    
    .code-container {
      border-radius: var(--radius-sm);
      overflow: hidden;
      max-height: 300px;
      display: none;
    }
    
    .code-container.expanded {
      display: block;
    }
    
    .CodeMirror {
      height: 300px;
      font-size: 0.8125rem;
      overscroll-behavior: contain;
    }

    .decision-card {
      padding: 18px;
    }

    .decision-eyebrow {
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .decision-title {
      margin-top: 10px;
      font-size: 1.625rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
      text-wrap: balance;
    }

    .decision-copy {
      margin-top: 10px;
      color: var(--text-secondary);
      font-size: 0.8125rem;
      line-height: 1.6;
    }

    .decision-hero {
      margin-top: 14px;
      padding: 14px;
      border-radius: var(--radius);
      border: 1px solid rgba(127, 127, 127, 0.16);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
        rgba(15, 23, 42, 0.22);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      display: grid;
      gap: 8px;
    }

    .decision-hero[data-tone="good"] {
      border-color: rgba(34, 197, 94, 0.3);
      background:
        linear-gradient(180deg, rgba(34, 197, 94, 0.14), rgba(34, 197, 94, 0.04)),
        rgba(15, 23, 42, 0.16);
    }

    .decision-hero[data-tone="warn"] {
      border-color: rgba(245, 158, 11, 0.34);
      background:
        linear-gradient(180deg, rgba(245, 158, 11, 0.14), rgba(245, 158, 11, 0.04)),
        rgba(15, 23, 42, 0.16);
    }

    .decision-hero[data-tone="neutral"] {
      border-color: rgba(96, 165, 250, 0.24);
    }

    .decision-hero-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .decision-hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 8px;
      border-radius: var(--radius-sm);
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-secondary);
    }

    .decision-hero[data-tone="good"] .decision-hero-badge {
      background: var(--accent-bg);
      color: var(--accent);
    }

    .decision-hero[data-tone="warn"] .decision-hero-badge {
      background: var(--warning-bg);
      color: var(--warning);
    }

    .decision-hero[data-tone="neutral"] .decision-hero-badge {
      background: var(--blue-bg);
      color: var(--blue);
    }

    .decision-hero-title {
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      text-wrap: balance;
    }

    .decision-hero-copy {
      color: var(--text-secondary);
      font-size: 0.8125rem;
      line-height: 1.6;
      text-wrap: pretty;
    }

    .decision-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 14px;
    }

    .decision-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .decision-row strong {
      color: var(--text-primary);
      text-align: end;
      font-variant-numeric: tabular-nums;
    }

    .decision-row .count {
      font-weight: 700;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .decision-hint {
      margin-top: 10px;
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .trust-card {
      padding: 16px;
    }

    .trust-grid {
      display: grid;
      gap: 2px;
    }

    .trust-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid rgba(127, 127, 127, 0.12);
    }

    .trust-row:first-child {
      padding-top: 0;
      border-top: none;
    }

    .trust-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .trust-copy strong {
      color: var(--text-primary);
      font-size: 0.8125rem;
    }

    .trust-copy span {
      color: var(--text-secondary);
      font-size: 0.75rem;
      line-height: 1.55;
      word-break: break-word;
    }

    .trust-link,
    .trust-link a {
      color: var(--blue);
      font-size: 0.75rem;
      text-decoration: none;
      white-space: nowrap;
    }

    .trust-link a:hover {
      text-decoration: underline;
    }

    .trust-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    
    /* Actions */
    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 18px;
    }
    
    .btn {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s, transform 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }
    
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    
    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }
    
    .btn-update {
      background: var(--blue);
      color: white;
    }
    
    .btn-update:hover {
      background: var(--blue-hover);
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    
    .btn-secondary:hover {
      background: var(--bg-hover);
    }

    .btn-secondary.is-armed {
      background: var(--warning);
      color: #1a1a1a;
    }

    .btn-secondary.is-armed:hover {
      background: #d97706;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .install-inline-spinner {
      width: 16px;
      height: 16px;
      border-width: 2px;
      margin: 0;
    }
    
    /* States */
    .loading {
      text-align: center;
      padding: 60px;
    }
    
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    
    .install-terminal {
      text-align: center;
      padding: 48px 32px;
      max-width: 560px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    
    .install-state-mark {
      width: 56px;
      height: 56px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      border: 1px solid rgba(127, 127, 127, 0.18);
      font-size: 1.125rem;
      font-weight: 800;
      letter-spacing: 0;
      margin-bottom: 18px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .install-state-mark.is-success {
      color: var(--accent);
      background: var(--accent-bg);
      border-color: rgba(34, 197, 94, 0.42);
    }

    .install-state-mark.is-error {
      color: var(--danger);
      background: var(--danger-bg);
      border-color: rgba(239, 68, 68, 0.48);
    }

    .install-state-mark.is-warning {
      color: var(--warning);
      background: var(--warning-bg);
      border-color: rgba(245, 158, 11, 0.48);
    }

    .error-icon,
    .success-icon {
      font-size: 1.125rem;
      margin-bottom: 18px;
    }
    
    .error-title {
      font-size: 1.3125rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--danger);
      text-wrap: balance;
    }
    
    .error-message {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.55;
      max-width: 440px;
      margin-bottom: 22px;
    }
    
    .success-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-wrap: balance;
    }
    
    .success-message {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.55;
      max-width: 460px;
      margin-bottom: 10px;
    }

    .success-next-step {
      width: 100%;
      max-width: 460px;
      margin: 8px 0 20px;
      padding: 12px 14px;
      border: 1px solid rgba(127, 127, 127, 0.16);
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.035);
      color: var(--text-muted);
      font-size: 0.8125rem;
      line-height: 1.45;
    }

    .success-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 8px;
    }

    .error-actions {
      display: flex;
      justify-content: center;
    }

    .success-actions .btn,
    .error-actions .btn {
      flex: none;
      min-width: 132px;
    }

    /* Downgrade badge */
    .downgrade-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--danger-bg);
      color: var(--danger);
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 500;
    }

    .btn-downgrade {
      background: var(--warning);
      color: #1a1a1a;
      font-weight: 600;
    }

    .btn-downgrade:hover {
      filter: brightness(0.9);
      transform: translateY(-1px);
    }

    /* Install error inline */
    .install-error {
      display: none;
      align-items: flex-start;
      gap: 8px;
      padding: 12px 14px;
      background: var(--danger-bg);
      border: 1px solid var(--danger);
      border-radius: var(--radius-sm);
      color: var(--danger);
      font-size: 0.8125rem;
      line-height: 1.45;
      margin-top: 12px;
    }

    .install-inline-mark {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-xs);
      border: 1px solid rgba(239, 68, 68, 0.42);
      color: var(--danger);
      background: rgba(239, 68, 68, 0.08);
      font-size: 0.75rem;
      font-weight: 800;
      line-height: 1;
    }

    .install-error-message {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .install-error-helper {
      color: var(--text-secondary);
    }

    .analysis-card {
      padding: 14px 16px 16px;
    }

    .analysis-summary {
      color: var(--text-secondary);
      font-size: 0.8125rem;
      line-height: 1.55;
      margin-bottom: 12px;
    }

    /* Premium review polish */
    .review-nav-btn:focus-visible,
    .code-preview-toggle:focus-visible,
    .match-list-toggle:focus-visible,
    .trust-link a:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--blue), 0 0 0 4px rgba(96, 165, 250, 0.16);
    }

    .surface-card,
    .decision-hero,
    .install-alert,
    .success-next-step,
    .install-error {
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), 0 18px 36px rgba(0, 0, 0, 0.12);
    }

    .decision-row,
    .trust-row {
      border-radius: var(--radius-sm);
      transition: background-color 150ms ease, border-color 150ms ease;
    }

    .decision-row {
      padding: 8px 0;
      border-top: 1px solid rgba(127, 127, 127, 0.1);
    }

    .decision-row:first-child {
      border-top: none;
    }

    .decision-row:hover,
    .trust-row:hover {
      background: rgba(255, 255, 255, 0.035);
    }

    .btn {
      min-height: 44px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12), 0 14px 28px rgba(0, 0, 0, 0.16);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .btn[aria-busy="true"] {
      cursor: progress;
    }

    .loading::after {
      content: '';
      display: block;
      width: min(360px, 100%);
      height: 58px;
      margin: 24px auto 0;
      border: 1px solid rgba(127, 127, 127, 0.16);
      border-radius: var(--radius);
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04));
      background-size: 220% 100%;
      animation: installLoadingSweep 1.05s ease-in-out infinite;
    }

    @keyframes installLoadingSweep {
      from { background-position: 120% 0; }
      to { background-position: -120% 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
        animation: none !important;
      }
    }

    @media (forced-colors: active) {
      :root {
        --bg-primary: Canvas;
        --bg-secondary: Canvas;
        --bg-tertiary: Canvas;
        --bg-hover: Canvas;
        --text-primary: CanvasText;
        --text-secondary: CanvasText;
        --text-muted: GrayText;
        --accent: Highlight;
        --accent-hover: Highlight;
        --accent-bg: Canvas;
        --blue: LinkText;
        --blue-hover: LinkText;
        --blue-bg: Canvas;
        --danger: CanvasText;
        --danger-bg: Canvas;
        --warning: CanvasText;
        --warning-bg: Canvas;
        --border: CanvasText;
        --shadow: none;
      }

      *, *::before, *::after {
        box-shadow: none !important;
        text-shadow: none !important;
      }

      body,
      .container,
      .header,
      .content,
      .install-skip-link,
      .card,
      .section,
      .decision-hero,
      .install-terminal,
      .review-nav,
      .code-container,
      .CodeMirror {
        background: Canvas !important;
        color: CanvasText !important;
        border-color: CanvasText !important;
      }

      button,
      input,
      select,
      textarea,
      .btn,
      .header-help-btn,
      .review-nav button,
      .match-list-toggle {
        background: ButtonFace !important;
        color: ButtonText !important;
        border-color: ButtonText !important;
      }

      a,
      .link,
      .source-link {
        color: LinkText !important;
      }

      :focus-visible,
      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible,
      .btn:focus-visible,
      .match-list-toggle:focus-visible {
        outline: 2px solid Highlight !important;
        outline-offset: 2px;
        box-shadow: none !important;
      }

      .status-good,
      .status-warn,
      .status-neutral,
      .decision-hero-badge {
        background: Highlight !important;
        color: HighlightText !important;
        border-color: Highlight !important;
      }
    }

    /* Responsive */
    @media (max-width: 56.25rem) {
      .install-layout {
        grid-template-columns: 1fr;
      }

      .install-sidebar {
        position: static;
      }

      .review-nav {
        top: 12px;
      }
    }

    @media (max-width: 37.5rem) {
      body {
        padding: 14px 10px 20px;
      }

      .container {
        border-radius: var(--radius);
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .review-nav {
        flex-wrap: nowrap;
        overflow-x: auto;
        padding: 7px;
      }
      
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        padding: 18px 16px 14px;
      }

      .header-actions {
        width: 100%;
        justify-content: space-between;
      }

      .content {
        padding: 16px;
      }

      .success-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <a class="install-skip-link" href="#content">Skip to install details</a>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="logo"><img src="../images/icon48.png" alt="ScriptVault" width="32" height="32" style="width:32px;height:32px"></div>
        <div class="header-text">
          <h1>Install Userscript</h1>
          <p>Review permissions, scope, and source details before bringing a script into ScriptVault.</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="header-help-btn" id="btnHelp" type="button" aria-label="Help" title="Help" data-help>?</button>
        <div id="install-type-badge"></div>
      </div>
    </div>
    
    <div class="content" id="content">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading script information…</div>
      </div>
    </div>
  </div>
  
  <script src="../shared/utils.js"></script>
  <script src="install.js"></script>
</body>
</html>
