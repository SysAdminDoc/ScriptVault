<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Install Userscript - ScriptVault</title>
  
  <!-- CodeMirror for code preview -->
  <link rel="stylesheet" href="../lib/codemirror/codemirror.min.css">
  <link rel="stylesheet" href="../lib/codemirror/theme/monokai.min.css">
  <link rel="stylesheet" href="../lib/codemirror/theme/dracula.min.css">
  <script src="../lib/codemirror/codemirror.min.js"></script>
  <script src="../lib/codemirror/mode/javascript/javascript.min.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --bg-hover: #475569;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --accent-bg: rgba(34, 197, 94, 0.1);
      --blue: #60a5fa;
      --blue-hover: #3b82f6;
      --blue-bg: rgba(96, 165, 250, 0.1);
      --danger: #ef4444;
      --danger-bg: rgba(239, 68, 68, 0.1);
      --warning: #f59e0b;
      --warning-bg: rgba(245, 158, 11, 0.1);
      --border: #334155;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 4px;
    }
    
    [data-theme="light"] {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --bg-hover: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    }

    [data-theme="catppuccin"] {
      --bg-primary: #1e1e2e;
      --bg-secondary: #252536;
      --bg-tertiary: #313244;
      --bg-hover: #3b3b52;
      --text-primary: #cdd6f4;
      --text-secondary: #a6adc8;
      --text-muted: #585b70;
      --accent: #a6e3a1;
      --accent-hover: #94d990;
      --accent-bg: rgba(166, 227, 161, 0.1);
      --blue: #89b4fa;
      --blue-hover: #74a8f7;
      --blue-bg: rgba(137, 180, 250, 0.1);
      --danger: #f38ba8;
      --danger-bg: rgba(243, 139, 168, 0.1);
      --warning: #f9e2af;
      --warning-bg: rgba(249, 226, 175, 0.1);
      --border: #45475a;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    [data-theme="oled"] {
      --bg-primary: #000000;
      --bg-secondary: #0a0a0a;
      --bg-tertiary: #151515;
      --bg-hover: #1f1f1f;
      --text-primary: #e0e0e0;
      --text-secondary: #999;
      --text-muted: #555;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --accent-bg: rgba(34, 197, 94, 0.1);
      --blue: #60a5fa;
      --blue-hover: #3b82f6;
      --blue-bg: rgba(96, 165, 250, 0.1);
      --danger: #ef4444;
      --danger-bg: rgba(239, 68, 68, 0.1);
      --warning: #f59e0b;
      --warning-bg: rgba(245, 158, 11, 0.1);
      --border: #1a1a1a;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
    }

    html:not([data-theme="light"]) {
      color-scheme: dark;
    }

    html[data-theme="light"] {
      color-scheme: light;
    }
    
    body {
      font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(34, 197, 94, 0.12), transparent 28rem),
        radial-gradient(circle at 85% 0%, rgba(96, 165, 250, 0.12), transparent 24rem),
        var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px 20px 40px;
      text-rendering: optimizeLegibility;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.2s, color 0.2s;
    }

    button, input, select, textarea, a {
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* Focus styles for accessibility */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    button:focus-visible { border-radius: 8px; }
    input:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--accent); }

    .container {
      max-width: 1080px;
      width: 100%;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 160px),
        var(--bg-secondary);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(127, 127, 127, 0.14);
    }
    
    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 28px 32px 24px;
      border-bottom: 1px solid var(--border);
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
    }
    
    .header-text h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
      text-wrap: balance;
    }
    
    .header-text p {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 34rem;
    }
    
    .update-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--blue-bg);
      color: var(--blue);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    
    .reinstall-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--warning-bg);
      color: var(--warning);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    
    /* Content */
    .content {
      padding: 28px 32px 32px;
    }

    .install-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 24px;
      align-items: start;
    }

    .install-main,
    .install-sidebar {
      min-width: 0;
    }

    .install-sidebar {
      position: sticky;
      top: 24px;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .surface-card {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 140%),
        var(--bg-tertiary);
      border: 1px solid rgba(127, 127, 127, 0.16);
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
      content-visibility: auto;
      contain-intrinsic-size: 220px;
    }
    
    /* Script Info Card */
    .script-card {
      overflow: hidden;
    }
    
    .script-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    
    .script-icon-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    
    .script-icon {
      width: 48px;
      height: 48px;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--text-muted);
    }
    
    .script-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: var(--radius-sm);
    }
    
    .script-title-area {
      flex: 1;
    }
    
    .script-name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .script-version {
      font-size: 13px;
      color: var(--text-muted);
    }
    
    .script-version .version-change {
      color: var(--blue);
    }
    
    .script-description {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .summary-card {
      padding: 14px 16px;
    }

    .summary-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
    }

    .summary-value {
      margin-top: 8px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    .summary-meta {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.55;
      color: var(--text-secondary);
    }
    
    /* Script Meta */
    .script-meta {
      padding: 20px;
    }
    
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    
    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .meta-item.full-width {
      grid-column: 1 / -1;
    }
    
    .meta-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    
    .meta-value {
      font-size: 13px;
      color: var(--text-secondary);
      word-break: break-all;
    }
    
    .meta-value a {
      color: var(--blue);
      text-decoration: none;
    }
    
    .meta-value a:hover {
      text-decoration: underline;
    }
    
    /* Sections */
    .section {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }
    
    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .section-title .count {
      background: var(--bg-secondary);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
    }

    .count.status-good {
      background: var(--accent);
      color: #fff;
    }

    .count.status-warn {
      background: var(--warning);
      color: #1a1a1a;
    }

    .count.status-neutral {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    
    /* Tags */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .tag {
      font-size: 12px;
      padding: 5px 12px;
      background: var(--bg-secondary);
      border-radius: var(--radius-xs);
      color: var(--text-secondary);
      font-family: 'Monaco', 'Menlo', monospace;
      border: 1px solid rgba(127, 127, 127, 0.12);
    }
    
    .tag.warning {
      background: var(--danger-bg);
      color: var(--danger);
    }
    
    .tag.safe {
      background: var(--accent-bg);
      color: var(--accent);
    }

    .tag.neutral {
      opacity: 0.7;
    }
    
    /* Match list */
    .match-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .match-item {
      font-size: 12px;
      font-family: 'Monaco', 'Menlo', monospace;
      color: var(--text-secondary);
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-radius: var(--radius-xs);
      word-break: break-all;
    }
    
    .match-item::before {
      content: '•';
      color: var(--accent);
      margin-right: 8px;
    }

    .match-item.neutral {
      color: var(--text-muted);
    }
    
    .install-alert-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .install-alert {
      border-radius: 16px;
      padding: 16px 18px;
      border: 1px solid rgba(127, 127, 127, 0.14);
      background: rgba(255, 255, 255, 0.03);
    }

    .install-alert.is-danger {
      border-color: rgba(239, 68, 68, 0.45);
      background: var(--danger-bg);
    }

    .install-alert.is-warning {
      border-color: rgba(245, 158, 11, 0.45);
      background: var(--warning-bg);
    }

    .install-alert.is-info {
      border-color: rgba(96, 165, 250, 0.35);
      background: var(--blue-bg);
    }

    .install-alert-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .install-alert.is-danger .install-alert-header {
      color: var(--danger);
    }

    .install-alert.is-warning .install-alert-header {
      color: var(--warning);
    }

    .install-alert.is-info .install-alert-header {
      color: var(--blue);
    }

    .install-alert-body {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .install-alert-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .install-alert-list-item {
      color: var(--text-secondary);
    }

    .install-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .install-card-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .install-card-subtitle {
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.5;
    }
    
    /* Options */
    .options {
      padding-top: 18px;
      margin-top: 18px;
      border-top: 1px solid var(--border);
    }
    
    .options-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    
    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
    }
    
    .option-row:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }
    
    .option-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .option-label {
      font-size: 14px;
      font-weight: 500;
    }
    
    .option-description {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    /* Toggle */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--bg-hover);
      transition: 0.2s;
      border-radius: 24px;
    }
    
    .toggle-slider::before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: var(--toggle-knob, #fff);
      transition: 0.2s;
      border-radius: 50%;
    }
    
    .toggle input:checked + .toggle-slider {
      background-color: var(--accent);
    }
    
    .toggle input:checked + .toggle-slider::before {
      transform: translateX(20px);
    }
    
    /* Code Preview */
    .code-preview {
      padding: 18px 20px 20px;
    }
    
    .code-preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    
    .code-preview-title {
      font-size: 14px;
      font-weight: 600;
    }

    .code-preview-title .install-card-subtitle {
      display: inline;
      margin-top: 0;
      margin-left: 6px;
      font-size: 12px;
      font-weight: 400;
    }
    
    .code-preview-toggle {
      font-size: 13px;
      color: var(--blue);
      cursor: pointer;
      background: none;
      border: none;
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 600;
    }
    
    .code-preview-toggle:hover {
      text-decoration: underline;
    }
    
    .code-container {
      border-radius: var(--radius-sm);
      overflow: hidden;
      max-height: 300px;
      display: none;
    }
    
    .code-container.expanded {
      display: block;
    }
    
    .CodeMirror {
      height: 300px;
      font-size: 13px;
      overscroll-behavior: contain;
    }

    .decision-card {
      padding: 22px;
    }

    .decision-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .decision-title {
      margin-top: 10px;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
      text-wrap: balance;
    }

    .decision-copy {
      margin-top: 10px;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.6;
    }

    .decision-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 18px;
    }

    .decision-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .decision-row strong {
      color: var(--text-primary);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .decision-row .count {
      font-weight: 700;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .decision-hint {
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .trust-card {
      padding: 20px;
    }

    .trust-grid {
      display: grid;
      gap: 2px;
    }

    .trust-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0;
      border-top: 1px solid rgba(127, 127, 127, 0.12);
    }

    .trust-row:first-child {
      padding-top: 0;
      border-top: none;
    }

    .trust-copy {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .trust-copy strong {
      color: var(--text-primary);
      font-size: 13px;
    }

    .trust-copy span {
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.55;
      word-break: break-word;
    }

    .trust-link,
    .trust-link a {
      color: var(--blue);
      font-size: 12px;
      text-decoration: none;
      white-space: nowrap;
    }

    .trust-link a:hover {
      text-decoration: underline;
    }

    .trust-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    
    /* Actions */
    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 18px;
    }
    
    .btn {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    
    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }
    
    .btn-update {
      background: var(--blue);
      color: white;
    }
    
    .btn-update:hover {
      background: var(--blue-hover);
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    
    .btn-secondary:hover {
      background: var(--bg-hover);
    }

    .btn-secondary.is-armed {
      background: var(--warning);
      color: #1a1a1a;
    }

    .btn-secondary.is-armed:hover {
      background: #d97706;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .install-inline-spinner {
      width: 16px;
      height: 16px;
      border-width: 2px;
      margin: 0;
    }
    
    /* States */
    .loading {
      text-align: center;
      padding: 60px;
    }
    
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      color: var(--text-muted);
      font-size: 14px;
    }
    
    .error {
      text-align: center;
      padding: 40px;
    }
    
    .error-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .error-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--danger);
    }
    
    .error-message {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }
    
    .success {
      text-align: center;
      padding: 60px;
    }
    
    .success-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    
    .success-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .success-message {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .success-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 8px;
    }

    /* Downgrade badge */
    .downgrade-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--danger-bg);
      color: var(--danger);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .btn-downgrade {
      background: var(--warning);
      color: #1a1a1a;
      font-weight: 600;
    }

    .btn-downgrade:hover {
      filter: brightness(0.9);
      transform: translateY(-1px);
    }

    /* Install error inline */
    .install-error {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--danger-bg);
      border: 1px solid var(--danger);
      border-radius: var(--radius-sm);
      color: var(--danger);
      font-size: 13px;
      margin-top: 16px;
    }

    .analysis-card {
      padding: 18px 20px 20px;
    }

    .analysis-summary {
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.55;
      margin-bottom: 12px;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .install-layout {
        grid-template-columns: 1fr;
      }

      .install-sidebar {
        position: static;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 16px 12px 24px;
      }

      .container {
        border-radius: 18px;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }
      
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        padding: 22px 20px 18px;
      }

      .content {
        padding: 20px;
      }

      .success-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <div class="logo"><img src="../images/icon48.png" alt="ScriptVault" style="width:32px;height:32px"></div>
        <div class="header-text">
          <h1>Install Userscript</h1>
          <p>Review permissions, scope, and source details before bringing a script into ScriptVault.</p>
        </div>
      </div>
      <div id="install-type-badge"></div>
    </div>
    
    <div class="content" id="content">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading script information...</div>
      </div>
    </div>
  </div>
  
  <script src="../shared/utils.js"></script>
  <script src="install.js"></script>
</body>
</html>
