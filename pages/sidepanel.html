<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptVault</title>
    <style>
        :root, [data-theme="dark"] {
            --bg: #1a1a1a;
            --bg-raised: #242424;
            --bg-hover: #2e2e2e;
            --border: #333;
            --text: #e0e0e0;
            --text-muted: #888;
            --accent: #4CAF50;
            --accent-dim: #2d6a30;
            --danger: #ef4444;
            --warning: #f59e0b;
            --badge-bg: #2a2a2a;
        }
        [data-theme="light"] {
            --bg: #f5f5f5;
            --bg-raised: #fff;
            --bg-hover: #ebebeb;
            --border: #ddd;
            --text: #333;
            --text-muted: #777;
            --accent: #16a34a;
            --accent-dim: #dcfce7;
            --danger: #dc2626;
            --warning: #d97706;
            --badge-bg: #f0f0f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        button:focus-visible, select:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; border-radius: 4px; }
        input:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--accent); }

        /* Header */
        .sp-header { background: var(--bg-raised); border-bottom: 1px solid var(--border); padding: 8px 10px; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .sp-logo { width: 18px; height: 18px; flex-shrink: 0; }
        .sp-title { font-weight: 600; font-size: 13px; color: var(--accent); flex: 1; }
        .sp-header-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 2px 4px; border-radius: 3px; font-size: 13px; transition: color 0.15s; }
        .sp-header-btn:hover { color: var(--text); background: var(--bg-hover); }

        /* URL bar */
        .sp-url-bar { background: var(--bg-raised); border-bottom: 1px solid var(--border); padding: 6px 10px; flex-shrink: 0; }
        .sp-url-text { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sp-url-hostname { color: var(--text); font-weight: 500; }

        /* Section headers */
        .sp-section { border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .sp-section-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; background: var(--bg-raised); cursor: pointer; }
        .sp-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
        .sp-section-count { font-size: 11px; color: var(--text-muted); background: var(--badge-bg); padding: 1px 5px; border-radius: 8px; }
        .sp-toggle-all { font-size: 11px; color: var(--accent); cursor: pointer; padding: 2px 6px; border: 1px solid var(--accent); border-radius: 3px; background: none; transition: background 0.15s; }
        .sp-toggle-all:hover { background: var(--accent-dim); }

        /* Script list */
        .sp-list { flex: 1; overflow-y: auto; min-height: 0; }
        .sp-list::-webkit-scrollbar { width: 4px; }
        .sp-list::-webkit-scrollbar-track { background: transparent; }
        .sp-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* Script items */
        .sp-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: default; }
        .sp-item:hover { background: var(--bg-hover); }
        .sp-item.has-error { border-left: 2px solid var(--danger); padding-left: 8px; }
        .sp-item.not-running { opacity: 0.5; }
        .sp-item-icon { width: 14px; height: 14px; flex-shrink: 0; border-radius: 2px; }
        .sp-item-name { flex: 1; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
        .sp-item-name:hover { color: var(--accent); text-decoration: underline; }
        .sp-item-desc { font-size: 10px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sp-item-meta { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
        .sp-timing { font-size: 10px; padding: 1px 4px; border-radius: 3px; font-weight: 600; }
        .sp-timing.fast { background: #14532d; color: #4ade80; }
        .sp-timing.medium { background: #78350f; color: #fbbf24; }
        .sp-timing.slow { background: #7f1d1d; color: #f87171; }
        .sp-error-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--danger); flex-shrink: 0; }

        /* Toggle */
        .sp-toggle { position: relative; width: 28px; height: 15px; flex-shrink: 0; }
        .sp-toggle input { opacity: 0; width: 0; height: 0; }
        .sp-toggle-slider { position: absolute; inset: 0; background: #444; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .sp-toggle-slider::before { content: ''; position: absolute; left: 2px; top: 2px; width: 11px; height: 11px; background: #888; border-radius: 50%; transition: transform 0.2s, background 0.2s; }
        .sp-toggle input:checked + .sp-toggle-slider { background: var(--accent-dim); }
        .sp-toggle input:checked + .sp-toggle-slider::before { background: var(--accent); transform: translateX(13px); }

        /* All scripts section */
        .sp-all-section { border-top: 1px solid var(--border); }
        .sp-all-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; background: var(--bg-raised); cursor: pointer; }
        .sp-collapse-icon { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; }
        .sp-all-list { overflow: hidden; max-height: 300px; overflow-y: auto; }
        .sp-all-list.collapsed { max-height: 0; }
        .sp-all-list::-webkit-scrollbar { width: 4px; }
        .sp-all-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* Empty state */
        .sp-empty { padding: 20px 10px; text-align: center; color: var(--text-muted); }
        .sp-empty-icon { font-size: 24px; margin-bottom: 6px; }
        .sp-empty-link { color: var(--accent); cursor: pointer; text-decoration: underline; }

        /* Footer */
        .sp-footer { background: var(--bg-raised); border-top: 1px solid var(--border); padding: 6px 10px; display: flex; gap: 6px; flex-shrink: 0; }
        .sp-footer-btn { flex: 1; padding: 5px 8px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 11px; cursor: pointer; text-align: center; transition: border-color 0.15s, color 0.15s; }
        .sp-footer-btn:hover { border-color: var(--accent); color: var(--accent); }
        .sp-footer-btn.primary { border-color: var(--accent); color: var(--accent); }

        /* Loading */
        .sp-loading { padding: 12px 10px; text-align: center; color: var(--text-muted); font-size: 11px; }

        /* v2.0: Search & Sort */
        .sp-search-bar { display: flex; align-items: center; gap: 4px; padding: 4px 10px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .sp-search-input { flex: 1; background: var(--bg-raised); border: 1px solid var(--border); border-radius: 3px; padding: 3px 6px; font-size: 11px; color: var(--text); outline: none; }
        .sp-search-input:focus { border-color: var(--accent); }
        .sp-search-input::placeholder { color: var(--text-muted); }
        .sp-sort-select { background: var(--bg-raised); border: 1px solid var(--border); border-radius: 3px; padding: 3px 4px; font-size: 10px; color: var(--text); cursor: pointer; }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; animation: none !important; }
        }
    </style>
</head>
<body>
    <div class="sp-header">
        <img class="sp-logo" src="../images/icon32.png" alt="">
        <span class="sp-title">ScriptVault</span>
        <button class="sp-header-btn" id="btnRefresh" title="Refresh" aria-label="Refresh scripts">↺</button>
        <button class="sp-header-btn" id="btnDashboard" title="Open Dashboard" aria-label="Open Dashboard">⊞</button>
    </div>

    <div class="sp-url-bar">
        <div class="sp-url-text" id="urlBar"><span class="sp-url-hostname" id="urlHostname">Loading…</span></div>
    </div>

    <div class="sp-section">
        <div class="sp-section-header">
            <span class="sp-section-title">On this page</span>
            <div style="display:flex;align-items:center;gap:6px">
                <span class="sp-section-count" id="pageScriptCount">0</span>
                <button class="sp-toggle-all" id="btnToggleAll">Toggle All</button>
            </div>
        </div>
    </div>

    <div class="sp-list" id="pageScriptList">
        <div class="sp-loading">Loading scripts…</div>
    </div>

    <!-- v2.0: Search & Sort Controls -->
    <div class="sp-search-bar">
        <input type="text" class="sp-search-input" id="spSearch" placeholder="Search scripts... (Ctrl+F)">
        <select class="sp-sort-select" id="spSort" title="Sort scripts">
            <option value="default">A-Z</option>
            <option value="alpha">Name</option>
            <option value="perf">Slowest</option>
            <option value="errors">Most Errors</option>
            <option value="recent">Recently Updated</option>
        </select>
    </div>

    <div class="sp-all-section" id="allSection">
        <div class="sp-all-header" id="allSectionHeader">
            <div style="display:flex;align-items:center;gap:6px">
                <span class="sp-section-title">All Scripts</span>
                <span class="sp-section-count" id="allScriptCount">0</span>
            </div>
            <span class="sp-collapse-icon" id="collapseIcon">▼</span>
        </div>
        <div class="sp-all-list" id="allScriptList"></div>
    </div>

    <div class="sp-footer">
        <button class="sp-footer-btn" id="btnNewScript">+ New</button>
        <button class="sp-footer-btn" id="btnFindScripts">Find Scripts</button>
        <button class="sp-footer-btn primary" id="btnOpenDash">Dashboard</button>
    </div>

    <script src="../shared/utils.js"></script>
    <script src="sidepanel.js"></script>
</body>
</html>
