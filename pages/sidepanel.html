<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
    <script src="page-dir.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="appName">ScriptVault</title>
    <link rel="stylesheet" href="theme-tokens.css">
    <style>
        :root {
            --bg: var(--sv-bg);
            --bg-raised: var(--sv-bg-raised);
            --bg-hover: var(--sv-bg-hover);
            --border: var(--sv-border);
            --text: var(--sv-text);
            --text-muted: var(--sv-text-muted);
            --accent: var(--sv-accent);
            --accent-dim: var(--sv-accent-dim);
            --danger: var(--sv-danger);
            --warning: var(--sv-warning);
            --badge-bg: var(--sv-badge-bg);
            --radius-panel: var(--sv-radius-panel);
            --radius-control: var(--sv-radius-control);
            --focus-ring: var(--sv-focus-ring);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-width: thin; scrollbar-color: rgb(from var(--sv-text) r g b / 0.15) transparent; }
        body { position: relative; font-family: 'Segoe UI Variable Text', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif; font-size: 0.8125rem; background: linear-gradient(180deg, var(--bg-raised) 0%, var(--bg) 24%, var(--bg) 100%); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding: 8px; gap: 6px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body::before { content: ''; position: fixed; inset: 0; pointer-events: none; background: linear-gradient(180deg, var(--sv-overlay), transparent 34%), linear-gradient(135deg, rgb(from var(--sv-accent) r g b / 0.09), rgb(from var(--sv-info) r g b / 0.035) 48%, transparent 84%); }
        button, input, select, a { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        :focus-visible { outline: none; box-shadow: var(--focus-ring); }
        button:focus-visible, select:focus-visible { border-radius: var(--radius-control); }
        input:focus-visible { outline: none; box-shadow: var(--focus-ring); }
        .sp-sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
        .sp-skip-link { position: absolute; left: 8px; top: 8px; z-index: 1000; transform: translateY(-150%); padding: 6px 9px; border: 1px solid var(--border); border-radius: var(--radius-control); background: var(--bg-raised); color: var(--text); font-size: 0.6875rem; font-weight: 700; text-decoration: none; transition: transform 0.15s ease; }
        .sp-skip-link:focus-visible { transform: translateY(0); }

        /* Header */
        .sp-header { background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-panel); box-shadow: 0 12px 28px rgba(0,0,0,0.16); padding: 8px 10px; display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
        .sp-logo { width: 18px; height: 18px; flex-shrink: 0; }
        .sp-title { font-weight: 700; font-size: 0.8125rem; color: var(--accent); flex: 1; letter-spacing: 0.01em; }
        .sp-header-btn { min-width: 24px; min-height: 24px; display: inline-flex; align-items: center; justify-content: center; background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px 6px; border-radius: 8px; font-size: 0.8125rem; transition: color 0.15s, background 0.15s, transform 0.15s; }
        .sp-header-btn:hover { color: var(--text); background: var(--bg-hover); transform: translateY(-1px); }
        .sp-header-btn svg { width: 15px; height: 15px; stroke-width: 2.1; }
        .sp-update-chip {
            min-width: 22px;
            height: 22px;
            padding: 0 6px;
            border: 1px solid rgb(from var(--sv-info) r g b / 0.34);
            border-radius: var(--radius-control);
            background: rgb(from var(--sv-info) r g b / 0.12);
            color: #93c5fd;
            font-size: 0.625rem;
            font-weight: 700;
            cursor: pointer;
            font-variant-numeric: tabular-nums;
        }
        .sp-update-chip[hidden] { display: none !important; }

        /* URL bar */
        .sp-url-bar { background: var(--sv-overlay-subtle); border: 1px solid var(--border); border-radius: var(--radius-panel); padding: 5px 8px; flex-shrink: 0; box-shadow: inset 0 1px 0 var(--sv-overlay-subtle); }
        .sp-url-text { display: flex; align-items: center; gap: 8px; font-size: 0.6875rem; color: var(--text-muted); min-width: 0; }
        .sp-url-hostname { color: var(--text); font-weight: 600; max-width: 46%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 3px 8px; border-radius: var(--radius-control); background: rgb(from var(--sv-accent) r g b / 0.12); flex-shrink: 0; }
        .sp-url-path { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sp-status { display: none; padding: 7px 9px; border: 1px solid rgb(from var(--sv-accent) r g b / 0.24); border-radius: var(--radius-panel); background: rgb(from var(--sv-accent) r g b / 0.1); color: var(--text); font-size: 0.6875rem; flex-shrink: 0; }
        .sp-status.show { display: block; }
        .sp-status.error { border-color: rgba(239,68,68,0.34); background: rgba(239,68,68,0.1); }
        .sp-context-banner { appearance: none; width: 100%; flex-shrink: 0; padding: 8px 10px; border: 1px solid rgba(239,68,68,0.36); border-radius: var(--radius-panel); background: linear-gradient(180deg, rgba(239,68,68,0.14), rgba(239,68,68,0.06)), var(--bg-raised); color: var(--text); font: inherit; font-size: 0.6875rem; font-weight: 700; line-height: 1.35; text-align: center; cursor: pointer; transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease, transform 0.15s ease; }
        .sp-context-banner:hover { border-color: var(--danger); background: linear-gradient(180deg, rgba(239,68,68,0.18), rgba(239,68,68,0.08)), var(--bg-raised); transform: translateY(-1px); }
        .sp-host-access { display: none; padding: 8px 9px; border: 1px solid rgba(245,158,11,0.36); border-radius: var(--radius-panel); background: rgba(245,158,11,0.12); color: var(--text); font-size: 0.6875rem; flex-shrink: 0; gap: 7px; }
        .sp-host-access.show { display: grid; }
        .sp-host-access-message { line-height: 1.35; color: var(--text); }
        .sp-host-access-btn { justify-self: start; border: 1px solid rgba(245,158,11,0.48); border-radius: var(--radius-control); background: rgba(245,158,11,0.14); color: var(--text); padding: 5px 8px; font-size: 0.6875rem; font-weight: 700; cursor: pointer; }
        .sp-host-access-btn:hover { background: rgba(245,158,11,0.22); transform: translateY(-1px); }

        /* Section headers */
        .sp-section { border: 1px solid var(--border); border-radius: var(--radius-panel); overflow: hidden; background: var(--bg-raised); flex-shrink: 0; }
        .sp-section-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 9px; background: var(--bg-raised); }
        .sp-section-title { font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
        .sp-section-count { font-size: 0.6875rem; color: var(--text-muted); background: var(--badge-bg); padding: 2px 7px; border-radius: var(--radius-control); font-variant-numeric: tabular-nums; }
        .sp-toggle-all { font-size: 0.6875rem; color: var(--accent); cursor: pointer; padding: 4px 8px; border: 1px solid rgb(from var(--sv-accent) r g b / 0.32); border-radius: var(--radius-control); background: rgb(from var(--sv-accent) r g b / 0.08); transition: background 0.15s, border-color 0.15s, transform 0.15s; }
        .sp-toggle-all:hover { background: var(--accent-dim); border-color: var(--accent); transform: translateY(-1px); }
        .sp-toggle-all:disabled { opacity: 0.6; cursor: wait; transform: none; }

        /* Script list */
        .sp-list { flex: 1; overflow-y: auto; overscroll-behavior: contain; min-height: 0; padding: 5px; border: 1px solid var(--border); border-radius: var(--radius-panel); background: var(--sv-overlay-faint); box-shadow: inset 0 1px 0 var(--sv-overlay-subtle); }
        .sp-list[data-empty="true"] { flex: 0 0 auto; min-height: 150px; max-height: 220px; }
        .sp-search-bar[hidden], .sp-search-meta[hidden], .sp-all-section[hidden] { display: none !important; }
        .sp-list::-webkit-scrollbar { width: 4px; }
        .sp-list::-webkit-scrollbar-track { background: transparent; }
        .sp-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* Script items */
        .sp-item { display: flex; align-items: center; gap: 7px; padding: 8px 9px; border: 1px solid var(--sv-overlay); border-radius: var(--radius-panel); background: var(--sv-overlay-subtle); transition: background 0.14s ease, border-color 0.14s ease, transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease; cursor: default; content-visibility: auto; contain-intrinsic-size: 48px; }
        .sp-item + .sp-item { margin-top: 6px; }
        .sp-item:hover { background: var(--bg-hover); border-color: rgb(from var(--sv-accent) r g b / 0.24); transform: translateY(-1px); box-shadow: 0 10px 24px rgba(0,0,0,0.14); }
        .sp-item.has-error { border-color: rgba(239,68,68,0.34); }
        .sp-item.not-running { opacity: 0.72; }
        .sp-item.busy { opacity: 0.7; border-color: rgb(from var(--sv-accent) r g b / 0.24); box-shadow: inset 0 0 0 1px rgb(from var(--sv-accent) r g b / 0.12); pointer-events: none; }
        .sp-item-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .sp-item-icon img {
            width: 18px;
            height: 18px;
            object-fit: cover;
            border-radius: 6px;
        }
        .sp-item-icon-badge {
            width: 100%;
            height: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: inherit;
            background:
                linear-gradient(135deg,
                    hsla(var(--sp-icon-hue, 145), 72%, 56%, 0.24),
                    hsla(calc(var(--sp-icon-hue, 145) + 34), 72%, 60%, 0.12));
            border: 1px solid hsla(var(--sp-icon-hue, 145), 72%, 58%, 0.24);
            color: hsl(var(--sp-icon-hue, 145), 88%, 80%);
            font-size: 0.5rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            box-shadow: inset 0 1px 0 var(--sv-overlay-strong);
        }
        .sp-item-name-btn {
            width: 100%;
            padding: 0;
            border: none;
            background: none;
            color: inherit;
            font: inherit;
            font-size: 0.75rem;
            text-align: start;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
            border-radius: 8px;
            transition: color 0.15s ease, background 0.15s ease;
        }
        .sp-item-name-btn:hover,
        .sp-item-name-btn:focus-visible {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .sp-item-name-btn:focus-visible {
            background: rgb(from var(--sv-accent) r g b / 0.08);
        }
        .sp-item-main { flex: 1; min-width: 0; }
        .sp-item-desc { font-size: 0.625rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sp-item-meta { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
        .sp-timing { font-size: 0.625rem; padding: 2px 6px; border-radius: var(--radius-control); font-weight: 600; font-variant-numeric: tabular-nums; }
        .sp-timing.fast { background: var(--timing-fast-bg, #14532d); color: var(--timing-fast, #4ade80); }
        .sp-timing.medium { background: var(--timing-med-bg, #78350f); color: var(--timing-med, #fbbf24); }
        .sp-timing.slow { background: var(--timing-slow-bg, #7f1d1d); color: var(--timing-slow, #f87171); }
        .sp-error-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--danger); flex-shrink: 0; }

        /* Toggle */
        .sp-toggle { position: relative; width: 40px; height: 24px; flex-shrink: 0; }
        .sp-toggle input { opacity: 0; width: 0; height: 0; }
        .sp-toggle-slider { position: absolute; inset: 0; background: var(--toggle-off-bg, #444); border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .sp-toggle-slider::before { content: ''; position: absolute; left: 3px; top: 3px; width: 18px; height: 18px; background: var(--toggle-off-knob, #888); border-radius: 50%; transition: transform 0.2s, background 0.2s; }
        .sp-toggle input:checked + .sp-toggle-slider { background: var(--accent-dim); }
        .sp-toggle input:checked + .sp-toggle-slider::before { background: var(--accent); transform: translateX(16px); }

        /* All scripts section */
        .sp-all-section { border: 1px solid var(--border); border-radius: var(--radius-panel); overflow: hidden; background: var(--bg-raised); }
        .sp-all-header { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 7px 9px; border: none; background: var(--bg-raised); color: inherit; font: inherit; cursor: pointer; text-align: start; transition: background 0.15s, color 0.15s; }
        .sp-all-header:hover { background: var(--bg-hover); }
        .sp-collapse-icon { font-size: 0.625rem; color: var(--text-muted); transition: transform 0.2s; }
        .sp-all-list { overflow: hidden; max-height: 300px; overflow-y: auto; overscroll-behavior: contain; padding: 5px; background: var(--sv-overlay-faint); }
        .sp-all-list.collapsed { max-height: 0; padding-top: 0; padding-bottom: 0; }
        .sp-all-list::-webkit-scrollbar { width: 4px; }
        .sp-all-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* Empty state */
        .sp-empty { padding: 16px 8px; text-align: center; color: var(--text-muted); }
        .sp-empty-icon { min-width: 34px; min-height: 28px; display: inline-flex; align-items: center; justify-content: center; margin: 0 auto 7px; border: 1px solid var(--border); border-radius: var(--radius-panel); background: var(--sv-overlay-subtle); color: var(--accent); font-size: 0.6875rem; font-weight: 700; letter-spacing: 0.08em; }
        .sp-empty-title { color: var(--text); font-size: 0.75rem; font-weight: 700; line-height: 1.35; }
        .sp-empty-detail { margin-top: 5px; color: var(--text-muted); font-size: 0.6875rem; line-height: 1.45; }
        .sp-empty-link { color: var(--accent); cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; font: inherit; }

        /* Footer */
        .sp-footer { background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-panel); padding: 7px 8px; display: flex; gap: 6px; flex-shrink: 0; box-shadow: 0 12px 28px rgba(0,0,0,0.16); }
        .sp-footer-btn { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 5px; padding: 6px 7px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: var(--radius-control); color: var(--text); font-size: 0.6875rem; font-weight: 600; cursor: pointer; text-align: center; transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.15s; }
        .sp-footer-btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
        .sp-footer-btn.primary { border-color: rgb(from var(--sv-accent) r g b / 0.34); color: var(--accent); background: rgb(from var(--sv-accent) r g b / 0.1); }
        .sp-footer-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

        /* Loading */
        .sp-loading { padding: 14px 8px; text-align: center; color: var(--text-muted); font-size: 0.6875rem; display: grid; gap: 9px; }
        .sp-loading::before,
        .sp-loading::after { content: ''; display: block; height: 34px; border-radius: var(--radius-control); background: linear-gradient(90deg, var(--sv-overlay), var(--sv-overlay-bright), var(--sv-overlay)); background-size: 220% 100%; animation: spLoadingSweep 1.05s ease-in-out infinite; }
        @keyframes spLoadingSweep { from { background-position: 120% 0; } to { background-position: -120% 0; } }

        /* v2.0: Search & Sort */
        .sp-search-bar { display: flex; align-items: center; gap: 5px; padding: 5px 8px; background: var(--sv-overlay-subtle); border: 1px solid var(--border); border-radius: var(--radius-panel); flex-shrink: 0; }
        .sp-search-input { order: 1; flex: 1; background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-control); padding: 5px 7px; font-size: 0.6875rem; color: var(--text); outline: none; }
        .sp-search-input:focus,
        .sp-search-input:focus-visible { border-color: var(--accent); box-shadow: 0 0 0 2px rgb(from var(--sv-accent) r g b / 0.18); }
        .sp-search-input::placeholder { color: var(--text-muted); }
        .sp-sort-select { order: 3; background: var(--bg-raised); border: 1px solid var(--border); border-radius: var(--radius-control); padding: 5px 7px; font-size: 0.625rem; color: var(--text); cursor: pointer; min-width: 24px; min-height: 24px; }
        .sp-search-clear { order: 2; border: 1px solid var(--border); background: var(--bg-raised); color: var(--text-muted); border-radius: var(--radius-control); padding: 5px 7px; font-size: 0.625rem; font-weight: 600; cursor: pointer; transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease; min-width: 24px; min-height: 24px; }
        .sp-search-clear:hover { color: var(--text); border-color: var(--accent); background: var(--bg-hover); }
        .sp-search-meta { display: flex; align-items: center; justify-content: space-between; min-height: 18px; padding: 0 4px; }
        .sp-search-status { font-size: 0.625rem; color: var(--text-muted); }

        /* Premium compact polish */
        .sp-status,
        .sp-context-banner,
        .sp-search-bar,
        .sp-list,
        .sp-all-list,
        .sp-footer {
            box-shadow: inset 0 1px 0 var(--sv-overlay);
        }
        .sp-search-bar:focus-within {
            border-color: rgb(from var(--sv-accent) r g b / 0.42);
            background: rgb(from var(--sv-accent) r g b / 0.06);
        }
        .sp-item:focus-within {
            background: var(--bg-hover);
            border-color: rgb(from var(--sv-accent) r g b / 0.28);
            box-shadow: inset 3px 0 0 var(--accent), 0 10px 24px rgba(0,0,0,0.14);
        }
        .sp-toggle input:focus-visible + .sp-toggle-slider {
            box-shadow: var(--focus-ring);
        }
        .sp-empty {
            margin: 4px;
            padding: 18px 12px;
            border: 1px dashed rgba(127,127,127,0.28);
            border-radius: var(--radius-panel);
            background: var(--sv-overlay-faint);
            line-height: 1.45;
        }
        .sp-empty-icon {
            box-shadow: inset 0 1px 0 var(--sv-overlay-medium);
        }
        .sp-footer-btn:active,
        .sp-toggle-all:active,
        .sp-header-btn:active {
            transform: translateY(0);
        }
        .sp-footer-btn:disabled,
        .sp-search-clear:disabled,
        .sp-toggle-all:disabled {
            box-shadow: none;
            filter: grayscale(0.2);
        }

        .sp-host-access {
            background:
                linear-gradient(135deg, rgba(245,158,11,0.16), rgba(239,68,68,0.08)),
                var(--bg-raised);
            border-color: rgba(245,158,11,0.38);
            box-shadow: inset 0 1px 0 var(--sv-overlay-medium), 0 10px 22px rgba(0,0,0,0.16);
        }

        .sp-host-access-message {
            color: var(--text);
            line-height: 1.45;
        }

        .sp-host-access-btn {
            min-height: 28px;
            border-color: rgba(245,158,11,0.44);
            background: rgba(245,158,11,0.12);
            font-weight: 700;
            transition: background 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
        }

        .sp-host-access-btn:hover,
        .sp-host-access-btn:focus-visible {
            background: rgba(245,158,11,0.2);
            border-color: rgba(245,158,11,0.62);
            outline: none;
        }

        .sp-status.error {
            border-color: rgba(239,68,68,0.36);
            background:
                linear-gradient(180deg, rgba(239,68,68,0.14), rgba(239,68,68,0.06)),
                var(--bg-raised);
        }

        .sp-empty-link:hover,
        .sp-empty-link:focus-visible {
            color: var(--text);
            text-decoration-thickness: 2px;
            text-underline-offset: 3px;
        }

        @media (forced-colors: active) {
            :root {
                --bg: Canvas;
                --bg-raised: Canvas;
                --bg-hover: Canvas;
                --border: CanvasText;
                --text: CanvasText;
                --text-muted: GrayText;
                --accent: Highlight;
                --accent-dim: Highlight;
                --danger: CanvasText;
                --warning: CanvasText;
                --badge-bg: Canvas;
                --focus-ring: none;
            }

            *, *::before, *::after {
                box-shadow: none !important;
                text-shadow: none !important;
            }

            body,
            .sp-header,
            .sp-url-bar,
            .sp-status,
            .sp-context-banner,
            .sp-section,
            .sp-list,
            .sp-item,
            .sp-all-section,
            .sp-all-list,
            .sp-footer,
            .sp-search-bar,
            .sp-empty,
            .sp-skip-link {
                background: Canvas !important;
                color: CanvasText !important;
                border-color: CanvasText !important;
            }

            button,
            input,
            select,
            .sp-footer-btn,
            .sp-header-btn,
            .sp-toggle-all,
            .sp-search-clear,
            .sp-sort-select {
                background: ButtonFace !important;
                color: ButtonText !important;
                border-color: ButtonText !important;
            }

            a,
            .sp-empty-link,
            .sp-item-name-btn {
                color: LinkText !important;
            }

            :focus-visible,
            button:focus-visible,
            input:focus-visible,
            select:focus-visible,
            .sp-item-name-btn:focus-visible {
                outline: 2px solid Highlight !important;
                outline-offset: 2px;
                box-shadow: none !important;
            }

            .sp-toggle input:checked + .sp-toggle-slider {
                background: Highlight !important;
            }

            .sp-toggle-slider::before {
                background: ButtonText !important;
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; animation: none !important; }
        }

        /* Panel position data attribute (Chrome 140+ sidePanel.getLayout) */
        html[data-panel-position="left"][dir="rtl"] .sp-header,
        html[data-panel-position="left"][dir="rtl"] .sp-controls {
            flex-direction: row-reverse;
        }

        /* Workbench-aligned side surface */
        .sp-header {
            min-height: 46px;
            padding: 8px 10px;
            border-color: var(--sv-border-strong);
            background:
                linear-gradient(180deg, var(--sv-overlay-medium), transparent),
                var(--sv-surface-raised);
            box-shadow: var(--sv-shadow-sm);
        }

        .sp-logo {
            width: 24px;
            height: 24px;
            filter: drop-shadow(0 5px 10px rgb(from var(--sv-accent) r g b / 0.2));
        }

        .sp-title {
            color: var(--text);
            font-size: 0.9375rem;
            letter-spacing: -0.01em;
        }

        .sp-url-bar,
        .sp-section,
        .sp-search-bar,
        .sp-all-section,
        .sp-footer {
            border-color: var(--sv-border-strong);
            background: var(--sv-surface-raised);
            box-shadow: var(--sv-shadow-xs);
        }

        .sp-url-bar {
            padding-block: 7px;
        }

        .sp-section-header,
        .sp-all-header {
            min-height: 38px;
        }

        .sp-list,
        .sp-all-list {
            background: var(--sv-surface-sunken);
        }

        .sp-footer {
            gap: 6px;
            padding: 6px;
        }

        .sp-footer-btn {
            min-height: 38px;
        }

        .sp-footer-btn.primary {
            border-color: var(--sv-accent-border);
            background: var(--sv-accent-soft);
            color: var(--text);
        }
    </style>
</head>
<body>
    <a class="sp-skip-link" href="#pageScriptList" data-i18n="sideSkipToScripts">Skip to scripts</a>
    <div class="sp-header">
        <img class="sp-logo" src="../images/icon32.png" alt="" width="18" height="18">
        <span class="sp-title" data-i18n="appName">ScriptVault</span>
        <button class="sp-update-chip" id="btnPendingUpdates" type="button" title="Open queued updates" aria-label="Open queued updates" data-i18n-title="sideOpenQueuedUpdates" data-i18n-aria-label="sideOpenQueuedUpdates" hidden>0</button>
        <button class="sp-header-btn" id="btnHelp" type="button" title="Help" aria-label="Help" data-i18n-title="tabHelp" data-i18n-aria-label="tabHelp" data-help>
            <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M9.1 9a3 3 0 1 1 5.8 1.3c-.6.8-1.4 1.1-2.1 1.7-.6.5-.8 1-.8 2"></path>
                <circle cx="12" cy="17" r="0.6"></circle>
            </svg>
        </button>
        <button class="sp-header-btn" id="btnRefresh" type="button" title="Refresh" aria-label="Refresh scripts" data-i18n-title="refresh" data-i18n-aria-label="sideRefreshScripts">
            <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M21 12a9 9 0 0 1-15.1 6.6"></path>
                <path d="M3 12A9 9 0 0 1 18.1 5.4"></path>
                <path d="M18 2v4h-4"></path>
                <path d="M6 22v-4h4"></path>
            </svg>
        </button>
        <button class="sp-header-btn" id="btnDashboard" type="button" title="Open Dashboard" aria-label="Open Dashboard" data-i18n-title="sideOpenDashboard" data-i18n-aria-label="sideOpenDashboard">
            <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <rect x="3" y="3" width="7" height="7" rx="1.5"></rect>
                <rect x="14" y="3" width="7" height="7" rx="1.5"></rect>
                <rect x="3" y="14" width="7" height="7" rx="1.5"></rect>
                <rect x="14" y="14" width="7" height="7" rx="1.5"></rect>
            </svg>
        </button>
    </div>

    <div class="sp-url-bar">
        <div class="sp-url-text" id="urlBar">
            <span class="sp-url-hostname" id="urlHostname" data-i18n="sideLoadingEllipsis">Loading…</span>
            <span class="sp-url-path" id="urlPath"></span>
        </div>
    </div>

    <div class="sp-status" id="statusMessage" role="status" aria-live="polite" aria-atomic="true" hidden></div>
    <div class="sp-host-access" id="hostAccessPanel" role="status" aria-live="polite" aria-atomic="true" hidden>
        <div class="sp-host-access-message" id="hostAccessMessage"></div>
        <button class="sp-host-access-btn" id="btnGrantHostAccess" type="button" data-i18n="sideGrantSiteAccess">Grant Site Access</button>
    </div>

    <div class="sp-section">
        <div class="sp-section-header">
            <span class="sp-section-title" data-i18n="sideOnThisPage">On this page</span>
            <div style="display:flex;align-items:center;gap:6px">
                <span class="sp-section-count" id="pageScriptCount">0</span>
                <button class="sp-toggle-all" id="btnToggleAll" type="button" data-i18n="sideToggleAll">Toggle All</button>
            </div>
        </div>
    </div>

    <div class="sp-list" id="pageScriptList" role="list" aria-label="Scripts running on this page" data-i18n-aria-label="sideScriptsRunningOnPageAria" aria-busy="true">
        <div class="sp-loading" data-i18n="sideLoadingScriptsEllipsis">Loading scripts…</div>
    </div>

    <!-- v2.0: Search & Sort Controls -->
    <div class="sp-search-bar" role="search" aria-label="Filter installed scripts" data-i18n-aria-label="sideFilterInstalledScriptsAria">
        <label class="sp-sr-only" for="spSearch" data-i18n="sideSearchInstalledScripts">Search installed scripts</label>
        <button class="sp-search-clear" id="btnClearSearch" type="button" aria-label="Clear script search" data-i18n-aria-label="sideClearScriptSearch" data-i18n="clearAction" hidden>Clear</button>
        <label class="sp-sr-only" for="spSort" data-i18n="sideSortInstalledScripts">Sort installed scripts</label>
        <input type="search" class="sp-search-input" id="spSearch" name="sidepanel_search" placeholder="Search scripts…" aria-label="Search scripts" data-i18n-placeholder="sideSearchScriptsPlaceholder" data-i18n-aria-label="searchScripts" aria-describedby="spSearchStatus" autocomplete="off" spellcheck="false">
        <select class="sp-sort-select" id="spSort" title="Sort scripts" aria-label="Sort scripts by" data-i18n-title="sideSortScriptsTitle" data-i18n-aria-label="sideSortScriptsTitle">
            <option value="default" data-i18n="sideSortInstallOrder">Install Order</option>
            <option value="alpha" data-i18n="sideSortAlpha">A-Z</option>
            <option value="perf" data-i18n="sideSortSlowest">Slowest</option>
            <option value="errors" data-i18n="sideSortMostErrors">Most Errors</option>
            <option value="recent" data-i18n="sideSortRecentlyUpdated">Recently Updated</option>
        </select>
    </div>
    <div class="sp-search-meta">
        <p class="sp-search-status" id="spSearchStatus" role="status" aria-live="polite" aria-atomic="true" data-i18n="sideShowingAllInstalledScripts">Showing all installed scripts.</p>
    </div>

    <div class="sp-all-section" id="allSection">
        <button class="sp-all-header" id="allSectionHeader" type="button" aria-expanded="true" aria-controls="allScriptList">
            <div style="display:flex;align-items:center;gap:6px">
                <span class="sp-section-title" data-i18n="sideAllScripts">All Scripts</span>
                <span class="sp-section-count" id="allScriptCount">0</span>
            </div>
            <span class="sp-collapse-icon" id="collapseIcon">▼</span>
        </button>
        <div class="sp-all-list" id="allScriptList" role="list" aria-labelledby="allSectionHeader" aria-busy="true"></div>
    </div>

    <div class="sp-footer">
        <button class="sp-footer-btn" id="btnNewScript" type="button">
            <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path>
            </svg>
            <span data-i18n="sideNew">New</span>
        </button>
        <button class="sp-footer-btn" id="btnFindScripts" type="button">
            <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
            </svg>
            <span data-i18n="sideFind">Find</span>
        </button>
        <button class="sp-footer-btn primary" id="btnOpenDash" type="button">
            <svg aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <rect x="3" y="3" width="7" height="7" rx="1.5"></rect>
                <rect x="14" y="3" width="7" height="7" rx="1.5"></rect>
                <rect x="3" y="14" width="7" height="7" rx="1.5"></rect>
                <rect x="14" y="14" width="7" height="7" rx="1.5"></rect>
            </svg>
            <span data-i18n="cmdOpenDashboard">Open dashboard</span>
        </button>
    </div>

    <script src="../shared/utils.js"></script>
    <script src="../modules/i18n.js"></script>
    <script src="sidepanel.js"></script>
</body>
</html>
